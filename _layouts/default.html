<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | default: 'Scientific models, publications, and interactive tools.' | escape }}">
  <title>{% if page.title %}{{ page.title | escape }} · {% endif %}{{ site.title | default: 'Geoenergy Portal' | escape }}</title>

  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=zodiak@400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/portal.css' | relative_url }}">

  {% seo %}
  {% include head-custom.html %}
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <header class="site-header">
    <div class="site-shell header-row">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Geoenergy Portal home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 46L30 18L38 32L50 14" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 50H51" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
            <circle cx="50" cy="14" r="4" fill="currentColor"/>
          </svg>
        </span>
        <span class="brand-copy">{{ site.title | default: 'Geoenergy Portal' }}<small>{{ site.tagline | default: 'Models · Writing · Tools' }}</small></span>
      </a>

      <div class="header-actions">
        <a class="top-link" href="#artifacts">Artifacts</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode">◐</button>
      </div>
    </div>
  </header>

  <main id="content" class="site-shell page-content" aria-label="Main content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-shell footer-row">
      <p>{{ site.footer_text | default: 'Built with Jekyll and GitHub Pages.' }}</p>
      <p><a href="#top">Back to top</a></p>
    </div>
  </footer>

  <script>
    (function () {
      const root = document.documentElement;
      const toggle = document.querySelector('[data-theme-toggle]');
      if (!toggle) return;
      let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', theme);
      const sync = () => {
        toggle.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`);
        toggle.textContent = theme === 'dark' ? '☼' : '◐';
      };
      sync();
      toggle.addEventListener('click', () => {
        theme = theme === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', theme);
        sync();
      });
    })();
  </script>
</body>
</html>
